name: daily-report

on:
  schedule:
    # UTC 22:00 (日〜木) = 日本時間 翌朝 7:00 (月〜金)
    # ※GitHubのcronは数分〜15分程度遅れることがあります
    - cron: "0 22 * * 0-4"
  workflow_dispatch: {}   # 手動実行ボタン（テスト用）

permissions:
  contents: write

env:
  TZ: Asia/Tokyo   # 日付の判定を日本時間で行う

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 日足キャッシュの復元（yfinance失敗時の保険）
        uses: actions/cache@v4
        with:
          path: data
          key: price-data-${{ github.run_id }}
          restore-keys: |
            price-data-

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 朝レポート生成
        run: python run.py

      - name: 結果をコミット（index.html / reports / history）
        run: |
          git config user.name "kabu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f index.html prices.json reports/ history/
          git commit -m "daily report $(date +%F)" || echo "変更なし"
          git pull --rebase origin main || true
          git push
