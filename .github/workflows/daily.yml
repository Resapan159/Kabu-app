name: daily-report

on:
  schedule:
    # 日本時間（JST = UTC+9）平日の 7:00 / 9:00 / 11:30 / 12:30 / 15:30 に実行
    # ※GitHubのcronは数分〜15分程度遅れることがあります
    - cron: "0 22 * * 0-4"   # JST 7:00（寄付前レポート）
    - cron: "0 0 * * 1-5"    # JST 9:00（寄付直後）
    - cron: "30 2 * * 1-5"   # JST 11:30（前場終了）
    - cron: "30 3 * * 1-5"   # JST 12:30（後場開始）
    - cron: "30 6 * * 1-5"   # JST 15:30（大引け後）
  workflow_dispatch: {}   # 手動実行ボタン（テスト用）

permissions:
  contents: write

env:
  TZ: Asia/Tokyo   # 日付の判定を日本時間で行う

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 日足キャッシュの復元（yfinance失敗時の保険）
        uses: actions/cache@v4
        with:
          path: data
          key: price-data-${{ github.run_id }}
          restore-keys: |
            price-data-

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: レポート生成
        run: python run.py

      - name: 結果をコミット（index.html / prices.json / reports / history）
        run: |
          git config user.name "kabu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f index.html prices.json archive.html reports/ history/
          git commit -m "report $(date '+%F %H:%M')" || echo "変更なし"
          git pull --rebase origin main || true
          git push

      - name: メール通知（朝7時の回のみ・GMAIL secrets設定時）
        if: github.event.schedule == '0 22 * * 0-4'
        continue-on-error: true
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          addr = os.environ.get("GMAIL_ADDRESS")
          pw = os.environ.get("GMAIL_APP_PASSWORD")
          if not addr or not pw:
              print("GMAIL secrets未設定のためスキップ")
              raise SystemExit(0)
          msg = MIMEText("今朝のレポートが更新されました。\n"
                         "https://resapan159.github.io/Kabu-app/", _charset="utf-8")
          msg["Subject"] = "📈 株 朝レポート更新"
          msg["From"] = addr
          msg["To"] = addr
          s = smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30)
          s.login(addr, pw)
          s.send_message(msg)
          s.quit()
          print("メール送信済み")
          PY
